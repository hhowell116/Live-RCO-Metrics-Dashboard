<script>
function setActiveTab(tab){
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  document.querySelectorAll('.iframe-wrapper').forEach(f => {
    f.classList.remove('active');
    f.style.display = 'none';
  });

  const frame = document.getElementById(`${tab}-frame`);
  if (frame){
    frame.classList.add('active');
    frame.style.display = 'block';
  }
}

// Dashboard view time tracking
let _trackingTab = 'fulfillment';
let _trackingStart = Date.now();
let _trackingEmail = null;

function flushViewTime() {
  // Demo mode: no-op (Firebase tracking removed)
}

// Flush on tab switch, page hide, and periodically
document.addEventListener('visibilitychange', () => { if (document.hidden) flushViewTime(); });
window.addEventListener('beforeunload', flushViewTime);
setInterval(flushViewTime, 300000); // flush every 5 min for long views

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    flushViewTime();
    const tab = btn.dataset.tab;
    _trackingTab = tab;
    _trackingStart = Date.now();
    setActiveTab(tab);
    history.replaceState(null, '', `#${tab}`);

    if (typeof broadcastThemeToIframes === 'function' && typeof getSavedTheme === 'function') {
      broadcastThemeToIframes(getSavedTheme());
    }
  });
});

// Load tab from URL hash on page load
const hashTab = window.location.hash.replace('#', '');
if (hashTab && document.querySelector(`.nav-btn[data-tab="${hashTab}"]`)) {
  setActiveTab(hashTab);
  _trackingTab = hashTab;
  _trackingStart = Date.now();
}
</script>

<script>
const THEME_KEY = 'rco_theme';
const themeBtn = document.getElementById('themeToggleBtn');

function moonIcon(){
  return `
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3a7 7 0 1 0 11.5 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>`;
}
function sunIcon(){
  return `
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z" stroke="currentColor" stroke-width="2"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>`;
}

function getSavedTheme(){
  return localStorage.getItem(THEME_KEY) || 'light';
}

function broadcastThemeToIframes(theme){
  document.querySelectorAll('iframe').forEach(f => {
    try { f.contentWindow.postMessage({ type: 'RCO_THEME', theme }, '*'); } catch(e) {}
  });
}

function broadcastTvStateToIframes(active){
  document.querySelectorAll('iframe').forEach(f => {
    try { f.contentWindow.postMessage({ type: 'TV_VIEW_STATE', active }, '*'); } catch(e) {}
  });
}

function setTheme(theme){
  const isDark = theme === 'dark';
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem(THEME_KEY, theme);

  if (themeBtn){
    themeBtn.innerHTML = isDark ? sunIcon() : moonIcon();
  }
  broadcastThemeToIframes(theme);
}

if (themeBtn){
  themeBtn.addEventListener('click', () => {
    const cur = getSavedTheme();
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });
}

setTheme(getSavedTheme());

document.querySelectorAll('iframe').forEach(f => {
  f.addEventListener('load', () => broadcastThemeToIframes(getSavedTheme()));
});
</script>

<script>
const tvBtn = document.getElementById('tvModeBtn');
const tvTransition = document.getElementById('tvTransition');

let tvEnabled = false;
let tvTimeout = null;
let tvIndex = 0;
const TV_STEP_MS = 8000;

function postToTab(tab, message){
  const frameWrap = document.getElementById(`${tab}-frame`);
  const iframe = frameWrap?.querySelector('iframe');
  if (!iframe?.contentWindow) return;
  try { iframe.contentWindow.postMessage(message, '*'); } catch(e) {}
}

function withTvFade(workFn, holdMs = 320){
  if (!tvTransition) { workFn(); return; }

  tvTransition.classList.add('show');
  setTimeout(() => { try { workFn(); } catch(e) {} }, 90);
  setTimeout(() => tvTransition.classList.remove('show'), holdMs);
}

const TV_PLAYLIST = [
  { tab: 'fulfillment', command: { type:'TV_ACTION', target:'fulfillment', dataset:'retail', view:'monthly' } },
  { tab: 'fulfillment', command: { type:'TV_ACTION', target:'fulfillment', dataset:'retail', view:'calendar' } },
  { tab: 'fulfillment', command: { type:'TV_ACTION', target:'fulfillment', dataset:'wholesale', view:'monthly' } },
  { tab: 'fulfillment', command: { type:'TV_ACTION', target:'fulfillment', dataset:'wholesale', view:'calendar' } },

  { tab: 'shipping' },

  { tab: 'daily-metrics' },

  { tab: 'sales' },

  { tab: 'top-products' },

  { tab: 'orders', command: { type:'TV_ACTION', target:'orders', view:'calendar' } },
  { tab: 'orders', command: { type:'TV_ACTION', target:'orders', view:'chart' } },

  { tab: 'unfulfilled' },

  { tab: 'international', command: { type:'TV_ACTION', target:'international', view:'world' } },
  { tab: 'international', command: { type:'TV_ACTION', target:'international', view:'us' } },

  { tab: 'skip-the-line' },

  { tab: 'fulfillment', command: { type:'TV_ACTION', target:'fulfillment', dataset:'retail', view:'monthly' } },
];

function scheduleNext(){
  clearTimeout(tvTimeout);
  tvTimeout = setTimeout(() => {
    tvIndex = (tvIndex + 1) % filteredPlaylist.length;
    runTvStep(tvIndex);
    scheduleNext();
  }, TV_STEP_MS);
}

// Filter playlist by role access
let filteredPlaylist = TV_PLAYLIST;
function filterTvPlaylist(email) {
  if (typeof RCO_ROLES !== 'undefined' && email) {
    filteredPlaylist = TV_PLAYLIST.filter(step => RCO_ROLES.canAccess(email, step.tab));
  }
}

function runTvStep(i){
  const step = filteredPlaylist[i % filteredPlaylist.length];

  withTvFade(() => {
    setActiveTab(step.tab);
    broadcastThemeToIframes(getSavedTheme());

    if (step.command){
      setTimeout(() => postToTab(step.tab, step.command), 60);
    }
  }, 340);
}

async function enterTvMode(){
  tvEnabled = true;
  tvBtn?.classList.add('active');
  document.body.classList.add('tv-mode');
  broadcastTvStateToIframes(true);
  if (window._authEmail) filterTvPlaylist(window._authEmail);

  try{
    if (!document.fullscreenElement){
      await document.documentElement.requestFullscreen();
    }
  } catch(e){
    console.error('Fullscreen failed:', e);
  }

  tvIndex = 0;
  runTvStep(tvIndex);
  scheduleNext();
}

async function exitTvMode(){
  tvEnabled = false;
  tvBtn?.classList.remove('active');
  clearTimeout(tvTimeout);
  tvTimeout = null;
  document.body.classList.remove('tv-mode');
  broadcastTvStateToIframes(false);

  try{
    if (document.fullscreenElement){
      await document.exitFullscreen();
    }
  } catch(e){
    console.error('Exit fullscreen failed:', e);
  }
}

if (tvBtn){
  tvBtn.addEventListener('click', () => {
    if (!tvEnabled) enterTvMode();
    else exitTvMode();
  });
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && tvEnabled){
    tvEnabled = false;
    tvBtn?.classList.remove('active');
    clearTimeout(tvTimeout);
    tvTimeout = null;
    document.body.classList.remove('tv-mode');
    broadcastTvStateToIframes(false);
  }
});
</script>

<script>
(function() {
  const ALL_STEPS = [
    {
      target: '.sidebar',
      title: 'Navigation Sidebar',
      desc: 'This is your main menu. Click any tab to switch between dashboards. The sidebar also shows today\'s live order count at the bottom.',
      position: 'right',
    },
    {
      target: '[data-tab="fulfillment"]',
      title: 'Fulfillment KPI',
      desc: 'Tracks daily order counts and fulfillment rates — how many orders ship within 4 or 7 days. Switch between Retail, Wholesale, and Total. View as a monthly table or calendar heat map.',
      tab: 'fulfillment',
      position: 'right',
    },
    {
      target: '[data-tab="shipping"]',
      title: 'Shipping Leaderboards',
      desc: 'Today\'s top shippers ranked by products shipped, pulled from ShipStation. Split into Full-Time, Part-Time, and Wholesale categories.',
      tab: 'shipping',
      position: 'right',
    },
    {
      target: '[data-tab="daily-metrics"]',
      title: 'Daily Metrics',
      desc: 'Live snapshot of today\'s performance — sales, orders, AOV, units sold, fulfillment progress, and top selling products. Shows both Retail and Wholesale side by side.',
      tab: 'daily-metrics',
      position: 'right',
    },
    {
      target: '[data-tab="sales"]',
      title: 'Sales Dashboard',
      desc: 'Sales summary showing Today, Month-to-Date, and Year-to-Date revenue and orders for both Retail and Wholesale, plus YTD combined totals at the bottom.',
      tab: 'sales',
      position: 'right',
    },
    {
      target: '[data-tab="top-products"]',
      title: 'Top Products',
      desc: 'Product rankings by units sold over the last 7 and 30 days, combining Retail and Wholesale data.',
      tab: 'top-products',
      position: 'right',
    },
    {
      target: '[data-tab="orders"]',
      title: 'Orders Overview',
      desc: 'Monthly summary cards showing total orders, fulfillment rates, unique customers, and top products. Toggle between Calendar card view and Chart trend view.',
      tab: 'orders',
      position: 'right',
    },
    {
      target: '[data-tab="unfulfilled"]',
      title: 'Unfulfilled Orders',
      desc: 'Current unfulfilled and partially fulfilled orders grouped by date, with average order size. Shows Retail and Wholesale separately.',
      tab: 'unfulfilled',
      position: 'right',
    },
    {
      target: '[data-tab="international"]',
      title: 'International Orders',
      desc: 'World map and US state map showing where orders come from. Filter by year and see country/state breakdowns with counts and percentages.',
      tab: 'international',
      position: 'right',
    },
    {
      target: '[data-tab="skip-the-line"]',
      title: 'Skip the Line',
      desc: 'Tracks priority "Skip the Line" orders — shows how many are open, unfulfilled, and partially fulfilled with a date breakdown.',
      tab: 'skip-the-line',
      position: 'right',
    },
    {
      target: '[data-tab="admin"]',
      title: 'Admin Panel',
      desc: 'IT Admin only. Shows who\'s accessing the site, role permissions matrix, dashboard usage analytics, user directory, and a full site overview.',
      tab: 'admin',
      role: 'admin',
      position: 'right',
    },
    {
      target: '#themeToggleBtn',
      title: 'Dark Mode',
      desc: 'Toggle between light and dark themes. Your preference is saved.',
      position: 'top',
    },
    {
      target: '#tvModeBtn',
      title: 'TV Mode',
      desc: 'Enters fullscreen and automatically cycles through all dashboards — perfect for a wall-mounted display.',
      position: 'top',
    },
    {
      target: '#orderCount',
      title: 'Today\'s Orders',
      desc: 'Live count of today\'s total orders (Retail + Wholesale) pulled directly from Shopify. Updates every 5 minutes.',
      position: 'top',
    },
  ];

  let steps = [];
  let currentStep = 0;

  function initWalkthrough(email) {
    const isAdmin = typeof RCO_ROLES !== 'undefined' && RCO_ROLES.isAdmin(email);

    // Filter steps based on role — only show tabs the user can see
    steps = ALL_STEPS.filter(s => {
      if (s.role === 'admin' && !isAdmin) return false;
      if (s.tab && typeof RCO_ROLES !== 'undefined' && !RCO_ROLES.canAccess(email, s.tab)) return false;
      return true;
    });
  }

  function showStep(idx) {
    const step = steps[idx];
    if (!step) return endTour();

    const el = document.querySelector(step.target);

    // Switch to the dashboard tab if needed
    if (step.tab) setActiveTab(step.tab);

    document.getElementById('wtStepCount').textContent = `Step ${idx + 1} of ${steps.length}`;
    document.getElementById('wtTitle').textContent = step.title;
    document.getElementById('wtDesc').textContent = step.desc;
    document.getElementById('wtBack').style.display = idx > 0 ? '' : 'none';
    document.getElementById('wtNext').textContent = idx === steps.length - 1 ? 'Finish' : 'Next';

    // Position tooltip near the target
    const tooltip = document.getElementById('wtTooltip');
    tooltip.className = 'wt-tooltip';

    if (el) {
      const rect = el.getBoundingClientRect();
      tooltip.style.position = 'fixed';

      if (step.position === 'right') {
        tooltip.style.left = (rect.right + 16) + 'px';
        const top = Math.max(10, Math.min(rect.top, window.innerHeight - 280));
        tooltip.style.top = top + 'px';
        tooltip.style.transform = 'none';
      } else if (step.position === 'top') {
        tooltip.style.left = rect.left + 'px';
        tooltip.style.top = (rect.top - 10) + 'px';
        tooltip.style.transform = 'translateY(-100%)';
      } else {
        tooltip.style.left = '50%';
        tooltip.style.top = '50%';
        tooltip.style.transform = 'translate(-50%, -50%)';
      }

      // Highlight element
      el.classList.add('wt-highlight');
      document.querySelectorAll('.wt-highlight').forEach(e => {
        if (e !== el) e.classList.remove('wt-highlight');
      });
    } else {
      tooltip.style.left = '50%';
      tooltip.style.top = '50%';
      tooltip.style.transform = 'translate(-50%, -50%)';
    }
  }

  function endTour() {
    document.getElementById('walkthroughOverlay').style.display = 'none';
    document.querySelectorAll('.wt-highlight').forEach(e => e.classList.remove('wt-highlight'));
    localStorage.setItem('rco_walkthrough_done', 'true');
    setActiveTab('fulfillment');
    history.replaceState(null, '', '#fulfillment');
  }

  document.getElementById('wtNext').addEventListener('click', () => {
    currentStep++;
    if (currentStep >= steps.length) endTour();
    else showStep(currentStep);
  });

  document.getElementById('wtBack').addEventListener('click', () => {
    if (currentStep > 0) { currentStep--; showStep(currentStep); }
  });

  document.getElementById('wtSkip').addEventListener('click', endTour);

  // Expose so auth callback can trigger it
  window.startWalkthrough = function(email) {
    initWalkthrough(email);
    currentStep = 0;
    document.getElementById('walkthroughOverlay').style.display = 'block';
    showStep(0);
  };

  window.shouldShowWalkthrough = function() {
    return !localStorage.getItem('rco_walkthrough_done');
  };

  // Help button to restart tour
  document.getElementById('helpBtn')?.addEventListener('click', () => {
    if (window._authEmail) startWalkthrough(window._authEmail);
  });
})();
</script>
